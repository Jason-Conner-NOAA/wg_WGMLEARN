---
layout: default
---
<div class="two-column-layout">
  <!-- Left/Main Column (70%) -->
  <main class="main-column" aria-label="Content">
    <article class="post">
      {% if page.banner_image %}
      <div class="group-banner">
        <img src="{{ page.banner_image | relative_url }}" alt="{{ page.title }} Banner">
      </div>
      {% endif %}
      <header class="post-header">
        <h1 class="post-title">{{ page.heading | default: page.title }}</h1>
        {% if page.tagline %}
        <p class="post-tagline">{{ page.tagline }}</p>
        {% endif %}
      </header>
      <div class="post-content">
        {{ content }}
      </div>
    </article>
  </main>

  <!-- Right Sidebar (30%) -->
  <aside class="sidebar-column">
    {% include sidebar.html %}
  </aside>
</div>
